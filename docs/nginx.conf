# =============================================================================
# zhijian.yuwb.cn — Nginx 配置
# 主项目: Next.js (zhijian) → 反向代理到 127.0.0.1:3000
# 子路径: /xyq/            → 静态文件 /www/wwwroot/xyq/
# =============================================================================

server {
    # ------------------------------------------------------------------
    # 端口与域名
    # ------------------------------------------------------------------
    listen 80;
    listen 443 ssl http2;
    server_name zhijian.yuwb.cn;

    # ------------------------------------------------------------------
    # SSL 证书（宝塔自动管理）
    # ------------------------------------------------------------------
    ssl_certificate         /www/server/panel/vhost/cert/zhijian/fullchain.pem;
    ssl_certificate_key     /www/server/panel/vhost/cert/zhijian/privkey.pem;
    ssl_protocols           TLSv1.2 TLSv1.3;
    ssl_ciphers             EECDH+CHACHA20:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache       shared:SSL:10m;
    ssl_session_timeout     10m;
    add_header              Strict-Transport-Security "max-age=31536000" always;
    error_page 497          https://$host$request_uri;

    # HTTP → HTTPS 强制跳转
    if ($server_port !~ 443) {
        rewrite ^(/.*)$ https://$host$1 permanent;
    }

    # ------------------------------------------------------------------
    # 默认首页
    # ------------------------------------------------------------------
    index index.html index.htm default.htm default.html;

    # ------------------------------------------------------------------
    # Let's Encrypt 证书验证（宝塔自动管理）
    # ------------------------------------------------------------------
    include /www/server/panel/vhost/nginx/extension/zhijian/*.conf;
    include /www/server/panel/vhost/nginx/well-known/zhijian.conf;

    location /.well-known/ {
        root /www/wwwroot/zhijian;
    }

    # 禁止在 .well-known 目录下放置可执行文件
    if ($uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$") {
        return 403;
    }

    # ------------------------------------------------------------------
    # 伪静态规则（宝塔自动管理）
    # ------------------------------------------------------------------
    include /www/server/panel/vhost/rewrite/node_zhijian.conf;

    # ==================================================================
    # 安全规则：禁止访问敏感文件
    # ==================================================================
    location ~* (\.user.ini|\.htaccess|\.htpasswd|\.env.*|\.project|\.bashrc|\.bash_profile|\.bash_logout|\.DS_Store|\.gitignore|\.gitattributes|LICENSE|README\.md|CLAUDE\.md|CHANGELOG\.md|CHANGELOG|CONTRIBUTING\.md|TODO\.md|FAQ\.md|composer\.json|composer\.lock|package(-lock)?\.json|yarn\.lock|pnpm-lock\.yaml|\.\w+~|\.swp|\.swo|\.bak(up)?|\.old|\.tmp|\.temp|\.log|\.sql(\.gz)?|docker-compose\.yml|docker\.env|Dockerfile|\.csproj|\.sln|Cargo\.toml|Cargo\.lock|go\.mod|go\.sum|phpunit\.xml|phpunit\.xml|pom\.xml|build\.gradl|pyproject\.toml|requirements\.txt|application(-\w+)?\.(ya?ml|properties))$ {
        return 404;
    }

    # ==================================================================
    # 安全规则：禁止访问敏感目录
    # ==================================================================
    location ~* /(\.git|\.svn|\.bzr|\.vscode|\.claude|\.idea|\.ssh|\.github|\.npm|\.yarn|\.pnpm|\.cache|\.husky|\.turbo|\.next|\.nuxt|node_modules|runtime)/ {
        return 404;
    }

    # ==================================================================
    # 静态上传文件目录（直读，不走 Node）
    # 用户上传的文件存放在 /www/wwwroot/zhijian/public/uploads/
    # 访问路径: https://zhijian.yuwb.cn/uploads/xxx.jpg
    # ==================================================================
    location /uploads/ {
        alias /www/wwwroot/zhijian/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ==================================================================
    # xyq 静态站点 (子路径部署)
    # 访问: https://zhijian.yuwb.cn/xyq/
    # 文件: /www/wwwroot/xyq/
    # ==================================================================
    location = /xyq {
        return 301 /xyq/;
    }

    location /xyq/ {
        alias /www/wwwroot/xyq/;
        index index.html;
        try_files $uri $uri/ /xyq/index.html;
    }

    # ==================================================================
    # 主站点 zhijian：Next.js 反向代理
    # 上游: 127.0.0.1:3000（pm2 / npm start 启动）
    # ==================================================================
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # ---- 请求头透传 ----
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # ---- WebSocket 支持（Next.js HMR / 长连接） ----
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # ---- 超时 ----
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    86400s;  # 后台长时间任务（如数据导出）
    }

    # ------------------------------------------------------------------
    # 日志
    # ------------------------------------------------------------------
    access_log /www/wwwlogs/zhijian.log;
    error_log  /www/wwwlogs/zhijian.error.log;
}
